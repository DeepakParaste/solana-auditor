name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build
        run: cargo build --manifest-path cli/Cargo.toml --verbose
        
      - name: Run tests
        run: cargo test --manifest-path cli/Cargo.toml --verbose
